{% extends 'base.html' %} {% block content %}

<div class="max-w-5xl mx-auto">
  <div class="mb-10">
    <h1 class="text-5xl font-extrabold text-primary">AI Hiring Assistant</h1>

    <p class="text-gray-500 mt-3 text-lg">
      Ask AI to identify the best candidates using semantic resume intelligence.
    </p>
  </div>

  <div class="card bg-base-100 shadow-2xl mb-10">
    <div class="card-body">
      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <textarea
          name="query"
          class="textarea textarea-bordered h-40 w-full text-lg"
          placeholder="Example: Find best candidate for Django backend development with cloud experience"
        ></textarea>

        <button class="btn btn-primary btn-lg">Analyze Candidates</button>
      </form>
    </div>
  </div>

  {% if response %}

  <div class="card bg-base-100 shadow-2xl">
    <div class="card-body">
      <h2 class="card-title text-3xl text-primary">AI Hiring Recommendation</h2>

      <div class="divider"></div>

      <div class="bg-base-200 rounded-2xl p-8">
        <pre class="whitespace-pre-wrap text-base leading-8 font-sans">

{{ response }}

                </pre
        >
      </div>
    </div>
  </div>

  {% endif %}
</div>

{% endblock %}
